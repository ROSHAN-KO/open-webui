version: '3.8'

services:
  kooptima-backend:
    image: python:3.11-slim
    container_name: kooptima-backend-dev
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
      - pip_cache:/root/.cache/pip
    ports:
      - "8090:8080"
    command: >
      bash -c "apt-get update && apt-get install -y libmariadb-dev gcc python3-dev && 
      pip install --upgrade pip && 
      pip install --no-cache-dir -r requirements.txt && 
      sh dev.sh"

  kooptima-frontend:
    image: node:22
    container_name: kooptima-frontend-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - npm_cache:/root/.npm
    ports:
      - "5173:5173"
    environment:
      - OPEN_WEBUI_BACKEND_URL=http://kooptima-backend:8090
    command: bash -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --force"